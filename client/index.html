<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Class Score Board</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            boardBlue: '#0f4c81',
            boardMint: '#2dd4bf',
            boardOrange: '#fb923c',
            boardRose: '#fb7185',
            boardLime: '#84cc16'
          }
        }
      }
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Baloo 2', sans-serif; }
    .rank-scroll { scroll-behavior: smooth; }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-sky-100 via-amber-50 to-emerald-100 text-slate-900 overflow-hidden">
  <div class="relative min-h-screen p-4 lg:p-6">
    <div class="absolute -top-28 -left-20 w-80 h-80 rounded-full bg-boardMint/25 blur-3xl"></div>
    <div class="absolute -bottom-24 -right-20 w-96 h-96 rounded-full bg-boardOrange/20 blur-3xl"></div>

    <header class="relative z-10 flex items-center justify-between mb-4">
      <div>
        <h1 class="text-4xl lg:text-5xl font-extrabold text-boardBlue">Classroom Stars Board</h1>
        <p class="text-slate-600 text-lg">Keep growing every day. Tap your card to view details.</p>
      </div>
      <div class="bg-white/70 backdrop-blur px-4 py-2 rounded-xl shadow text-lg font-semibold text-boardBlue">
        <span id="clock"></span>
      </div>
    </header>

    <main class="relative z-10 grid grid-cols-1 lg:grid-cols-3 gap-4 h-[82vh]">
      <section class="lg:col-span-2 bg-white/75 backdrop-blur rounded-3xl border border-white shadow-lg p-4 flex flex-col">
        <div class="flex items-center justify-between mb-3">
          <h2 class="text-2xl font-bold text-boardBlue">Students</h2>
          <span class="text-slate-600">Tap to view score history</span>
        </div>
        <div id="studentGrid" class="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-3 overflow-auto pr-1"></div>
      </section>

      <section class="bg-white/75 backdrop-blur rounded-3xl border border-white shadow-lg p-4 flex flex-col">
        <h2 class="text-2xl font-bold text-boardBlue mb-3">Live Ranking</h2>
        <div id="rankingList" class="rank-scroll flex-1 overflow-auto space-y-2 pr-1"></div>
      </section>
    </main>

    <div id="detailPanel" class="hidden absolute inset-0 bg-slate-900/45 z-30 items-center justify-center p-4">
      <div class="w-full max-w-3xl bg-white rounded-3xl shadow-2xl p-5 lg:p-6 max-h-[90vh] overflow-auto">
        <div class="flex items-start justify-between gap-3 mb-4">
          <div>
            <h3 id="detailName" class="text-3xl font-extrabold text-boardBlue"></h3>
            <p id="detailMeta" class="text-slate-600"></p>
          </div>
          <div class="text-right">
            <button id="closeDetail" class="bg-boardBlue text-white px-4 py-2 rounded-xl font-semibold">Close</button>
            <p id="autoBackText" class="text-sm text-slate-500 mt-1">Auto back in 15s</p>
          </div>
        </div>
        <div class="bg-slate-100 rounded-xl p-3 mb-4">
          <div class="flex justify-between text-sm text-slate-700 mb-1">
            <span id="progressLabel"></span>
            <span id="progressPct"></span>
          </div>
          <div class="h-4 bg-white rounded-full overflow-hidden">
            <div id="progressBar" class="h-full bg-gradient-to-r from-boardMint via-boardLime to-boardOrange transition-all duration-500"></div>
          </div>
        </div>
        <h4 class="text-xl font-bold mb-2">Score History</h4>
        <div id="logList" class="space-y-2"></div>
      </div>
    </div>

    <div id="scorePopup" class="hidden absolute inset-0 z-40 items-center justify-center pointer-events-none">
      <div id="scorePopupCard" class="bg-white/95 border-4 border-boardOrange rounded-3xl px-8 py-6 shadow-2xl text-center transform scale-90 opacity-0 transition-all duration-300">
        <p class="text-slate-600 text-lg">Score Update</p>
        <h3 id="scorePopupText" class="text-4xl font-extrabold text-boardBlue"></h3>
        <p id="scorePopupReason" class="text-slate-500 mt-1"></p>
      </div>
    </div>
  </div>

  <script src="./main.js"></script>
</body>
</html>
